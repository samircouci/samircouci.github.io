<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السورة</title>

<link rel="stylesheet" href="style.css">

<style>
.ayah{
font-size:24px;
line-height:2.2;
text-align:center;
padding:15px;
margin:10px 0;
background:rgba(255,255,255,0.05);
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
}

.ayah span{
color:#FFD700;
font-weight:bold;
}

.loading{
text-align:center;
color:#FFD700;
font-size:18px;
padding:20px;
}
</style>

</head>

<body>

<header>
<h1 id="surah-name">📖 السورة</h1>
<p>رواية حفص عن عاصم</p>
</header>

<main class="card">

<div id="surah-content">
<p class="loading">جاري تحميل السورة...</p>
</div>

<a href="quran.html" class="button back-btn">
⬅ العودة إلى فهرس السور
</a>

</main>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || 1;

fetch("https://api.alquran.cloud/v1/surah/" + id)
.then(response => response.json())
.then(data => {

document.getElementById("surah-name").innerHTML =
"📖 " + data.data.englishName + " - " + data.data.name;

let html = "";

data.data.ayahs.forEach(ayah => {
html += `
<div class="ayah">
${ayah.text}
<br>
<span>﴿${ayah.numberInSurah}﴾</span>
</div>
`;
});

document.getElementById("surah-content").innerHTML = html;

})
.catch(() => {
document.getElementById("surah-content").innerHTML =
"<p style='color:red;text-align:center;'>فشل تحميل السورة</p>";
});

</script>

</body>
</html>

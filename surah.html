<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>القرآن الكريم</title>

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap"
rel="stylesheet">

<style>

body{

background:#0c0d12;

margin:0;

padding:0;

font-family:'Amiri',serif;

}

.top-bar{

position:sticky;

top:0;

background:#151821;

padding:18px;

border-bottom:2px solid #caa33b;

display:flex;

align-items:center;

justify-content:space-between;

z-index:999;

}

.back{

text-decoration:none;

color:#FFD54A;

font-size:22px;

font-weight:bold;

}

#surah-name{

color:#FFD54A;

font-size:34px;

text-align:center;

flex:1;

}

#content{

max-width:900px;

margin:auto;

padding:25px;

}

.ayah{

font-size:36px;

line-height:2.5;

text-align:justify;

background:#161922;

margin-bottom:18px;

padding:25px;

border-radius:22px;

border:1px solid rgba(255,215,0,.18);

box-shadow:0 5px 15px rgba(0,0,0,.25);

}

.ayah-number{

display:inline-flex;

align-items:center;

justify-content:center;

width:42px;

height:42px;

margin-right:12px;

border-radius:50%;

background:#FFD54A;

color:#111;

font-size:18px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="top-bar">

<a class="back"

href="quran.html">

← رجوع

</a>

<div id="surah-name">

جاري التحميل...

</div>

</div>

<div id="content">

<div style="text-align:center">

جاري تحميل السورة...

</div>

</div>
<script>

const id = new URLSearchParams(window.location.search).get("id") || 1;

const surahName = document.getElementById("surah-name");

const content = document.getElementById("content");

fetch("https://api.alquran.cloud/v1/surah/" + id + "/quran-uthmani")

.then(response => response.json())

.then(result => {

const surah = result.data;

surahName.innerHTML = surah.englishName + " - " + surah.name;

let html = "";

surah.ayahs.forEach(ayah => {

html += `

<div class="ayah">

${ayah.text}

<span class="ayah-number">

${ayah.numberInSurah}

</span>

</div>

`;

});

content.innerHTML = html;

})

.catch(error => {

content.innerHTML = `

<div style="text-align:center;
padding:40px;
font-size:22px;
color:#FFD54A;">

تعذر تحميل السورة

</div>

`;

console.log(error);

});

</script>
</body>

</html>

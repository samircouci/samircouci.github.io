<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السورة</title>

<link rel="stylesheet" href="style.css">

<style>

.mushaf{

max-width:900px;

margin:auto;

padding:20px;

}

#surah-name{

text-align:center;

font-size:36px;

color:#FFD700;

margin:25px 0;

}

.ayah{

font-size:34px;

line-height:2.4;

text-align:center;

margin:20px 0;

color:#fff;

}

.ayah-number{

display:inline-flex;

align-items:center;

justify-content:center;

width:38px;

height:38px;

border:2px solid #FFD700;

border-radius:50%;

font-size:16px;

color:#FFD700;

margin-right:8px;

margin-left:8px;

vertical-align:middle;

}

.back{

display:block;

width:220px;

margin:40px auto;

padding:14px;

text-align:center;

text-decoration:none;

background:#FFD700;

color:#111;

font-weight:bold;

border-radius:14px;

}

</style>

</head>

<body>

<div class="mushaf">

<h1 id="surah-name">

جاري التحميل...

</h1>

<div id="content">

</div>

<a class="back" href="index.html">

⬅ العودة للفهرس

</a>

</div>

<script>

const id=new URLSearchParams(location.search).get("id")||1;

fetch("https://api.alquran.cloud/v1/surah/"+id)

.then(r=>r.json())

.then(data=>{

document.getElementById("surah-name").innerHTML=data.data.name;

let html="";

data.data.ayahs.forEach(a=>{

html+=`

<div class="ayah">

${a.text}

<span class="ayah-number">

${a.numberInSurah}

</span>

</div>

`;

});

document.getElementById("content").innerHTML=html;

});

</script>

</body>

</html>
